# ============================================================
# MeoFind — 示例配置文件 (TOML)
# 演示 TOML 格式的各种语法特性，用于测试文件预览功能
# ============================================================

[app]
name = "MeoFind"
version = "1.0.0"
bundle_id = "com.explorer.app"
description = "macOS 全能文件管理器与预览工具"

[app.developer]
team = "Explorer Dev Team"
website = "https://meofind.app"
license = "MIT"

# ---- 窗口布局 ----

[window]
default_width = 1200
default_height = 800
min_width = 600
min_height = 400
start_maximized = false
remember_position = true

[window.sidebar]
default_width = 240
min_width = 180
max_width = 400
collapsible = true

# ---- 预览设置 ----

[preview]
enabled = true
auto_play_media = false
max_file_size_mb = 200
timeout_seconds = 8

[preview.image]
fit_to_window = true
zoom_step = 0.25
max_zoom = 32.0
supported = ["jpg", "jpeg", "png", "gif", "webp", "heic", "svg", "bmp", "tiff"]

[preview.text]
font_name = "SF Mono"
font_size = 13
line_numbers = true
word_wrap = true
tab_width = 4
highlight_syntax = true

[preview.media]
autoplay = false
loop = false
default_volume = 0.8
supported_video = ["mp4", "mov", "mkv", "webm", "avi"]
supported_audio = ["mp3", "wav", "aac", "flac", "m4a"]

# ---- 快捷键 ----

[keybindings]
toggle_preview = "cmd+shift+p"
toggle_sidebar = "cmd+shift+s"
new_window = "cmd+n"
quick_search = "cmd+f"
open_terminal = "cmd+shift+t"

# ---- 文件过滤 ----

[file_filter]
show_hidden = false
show_system_files = false
case_sensitive_sort = false

[file_filter.exclude]
patterns = [".DS_Store", "Thumbs.db", "*.tmp", "*.swp", "~*"]
directories = [".git", ".svn", "node_modules", "__pycache__", ".build"]

# ---- 主题 ----

[[themes]]
id = "light"
name = "浅色模式"
type = "light"

[themes.colors]
background = "#FFFFFF"
foreground = "#1A1A1A"
accent = "#007AFF"
sidebar_bg = "#F5F5F5"
selection = "#D4E5FF"

[[themes]]
id = "dark"
name = "深色模式"
type = "dark"

[themes.colors]
background = "#1E1E1E"
foreground = "#E0E0E0"
accent = "#0A84FF"
sidebar_bg = "#252525"
selection = "#3A3A3A"

# ---- 插件配置 ----

[[plugins]]
name = "Markdown Preview"
author = "Explorer Team"
version = "2.1.0"
enabled = true
supports = [".md", ".markdown", ".mdown"]

[[plugins]]
name = "Archive Browser"
author = "Explorer Team"
version = "1.0.0"
enabled = true
supports = [".zip", ".tar", ".tar.gz", ".tgz", ".rar", ".7z"]

[[plugins]]
name = "Hex Viewer"
author = "Community"
version = "0.9.0-beta"
enabled = false
supports = ["*"]

# ---- 网络/远程 ----

[remote]
enabled = false
default_protocol = "sftp"

[remote.servers.default]
host = "192.168.1.100"
port = 22
username = "user"
auth_method = "key"
key_path = "~/.ssh/id_ed25519"

# ---- 实验性功能 ----

[experimental]
enable_ai_assistant = false
enable_3d_preview = false
enable_real_time_collaboration = false

# ---- 日期与时间 ----

[metadata]
created_at = 2026-07-10T10:30:00+08:00
updated_at = 2026-07-10T14:00:00+08:00
